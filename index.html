<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXXY! | Temporal Kernel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, addDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu2rosyyF2AJi_hVo-8XhXGsofTJ9zzdQ",
            authDomain: "myapp-1bc82.firebaseapp.com",
            projectId: "myapp-1bc82",
            storageBucket: "myapp-1bc82.firebasestorage.app",
            messagingSenderId: "723618358633",
            appId: "1:723618358633:web:24c6a343707c53de7009f8",
            measurementId: "G-2T0XL00LHH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'foxxy-temporal-pro';

        window.state = {
            user: null,
            isAdmin: false,
            authReady: false,
            timeNodes: [], 
            intervals: [], 
            deviceId: localStorage.getItem('foxxy_hwid') || (() => {
                const newId = 'HWID-' + crypto.randomUUID().split('-')[0].toUpperCase();
                localStorage.setItem('foxxy_hwid', newId);
                return newId;
            })()
        };

        // MANDATORY RULE 3: Auth before queries
        // Fixed: Added try-catch and specific fallback for custom token mismatch
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                        console.log("Custom token auth successful");
                    } catch (tokenError) {
                        console.warn("Custom token failed, falling back to anonymous", tokenError);
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth failed permanently:", e);
                showToast("Auth Service Offline", true);
            }
        };

        initAuth();
        
        onAuthStateChanged(auth, (u) => {
            window.state.user = u;
            if (u) {
                window.state.authReady = true;
                console.log("Authenticated as:", u.uid);
            } else {
                window.state.authReady = false;
            }
        });

        window.copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Key Copied!");
            } catch (err) {
                showToast("Copy Failed", true);
            }
            document.body.removeChild(textArea);
        };

        window.handleLogin = async () => {
            // Guard: Must be authenticated first
            if (!window.state.user) {
                showToast("Establishing Secure Connection...", false);
                await initAuth();
                if (!window.state.user) return showToast("Network Error", true);
            }

            const key = document.getElementById('license-key-input').value.trim();
            const btn = document.getElementById('login-btn');
            
            if (key === "THINETHHUTTO") {
                window.state.isAdmin = true;
                showToast("Admin Session Verified");
                showView('admin-view');
                setTimeout(() => loadAllKeys(), 500); 
                return;
            }

            if (!key) return showToast("Please enter a key", true);

            btn.disabled = true;
            btn.innerText = "VERIFYING HWID...";

            try {
                // RULE 1: Strict Paths
                const keyRef = doc(db, 'artifacts', appId, 'public', 'data', 'licenses', key.toUpperCase());
                const keySnap = await getDoc(keyRef);

                if (keySnap.exists()) {
                    const data = keySnap.data();
                    if (!data.boundDevice) {
                        await updateDoc(keyRef, {
                            boundDevice: window.state.deviceId,
                            activatedAt: new Date().toISOString(),
                            userId: window.state.user.uid
                        });
                        showToast("Key Bound to HWID!");
                        showView('dashboard-view');
                    } else if (data.boundDevice === window.state.deviceId) {
                        showToast("Access Granted");
                        showView('dashboard-view');
                    } else {
                        showToast("LOCKED TO OTHER DEVICE", true);
                    }
                } else {
                    showToast("Invalid License Key", true);
                }
            } catch (error) {
                console.error(error);
                showToast("Connection Refused", true);
            } finally {
                btn.disabled = false;
                btn.innerText = "AUTHORIZE KERNEL";
            }
        };

        window.generateKey = async () => {
            if (!window.state.isAdmin || !window.state.user) return;
            const newKey = "FX-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            try {
                const keyRef = doc(db, 'artifacts', appId, 'public', 'data', 'licenses', newKey);
                await setDoc(keyRef, {
                    boundDevice: null,
                    createdAt: new Date().toISOString(),
                    type: 'standard'
                });
                showToast("Key Generated: " + newKey);
                loadAllKeys();
            } catch (e) {
                showToast("Database Write Error", true);
            }
        };

        window.loadAllKeys = async () => {
            if (!window.state.user) return;
            const list = document.getElementById('admin-key-list');
            list.innerHTML = '<div class="text-zinc-600 animate-pulse text-xs">Syncing registry...</div>';
            
            try {
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'licenses');
                const snap = await getDocs(q);
                list.innerHTML = '';
                
                if (snap.empty) {
                    list.innerHTML = '<div class="text-zinc-600 text-xs italic">No keys found in registry.</div>';
                    return;
                }

                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const item = document.createElement('div');
                    item.className = "p-4 bg-black/40 border border-white/5 rounded-xl mb-3 flex justify-between items-center animate-in fade-in duration-500";
                    item.innerHTML = `
                        <div>
                            <div class="text-white font-mono font-bold tracking-wider">${docSnap.id}</div>
                            <div class="text-[9px] mt-1 ${data.boundDevice ? 'text-blue-400' : 'text-zinc-500'}">
                                ${data.boundDevice ? 'LOCKED: ' + data.boundDevice : 'AVAILABLE'}
                            </div>
                        </div>
                        <button onclick="copyToClipboard('${docSnap.id}')" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                            <i data-lucide="copy" class="w-4 h-4 text-zinc-400"></i>
                        </button>
                    `;
                    list.appendChild(item);
                });
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                list.innerHTML = `
                    <div class="text-red-500/50 text-xs p-4 border border-red-500/20 rounded-xl bg-red-500/5">
                        Registry Sync Failed.
                        <button onclick="loadAllKeys()" class="block mt-2 underline text-white">Retry Sync</button>
                    </div>`;
            }
        };

        window.showView = (id) => {
            document.querySelectorAll('.view-layer').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-view') initChart();
        };

        window.syncCurrentTime = () => {
            const now = new Date();
            const timestamp = now.getTime();
            if (window.state.timeNodes.length > 0) {
                const diff = Math.floor((timestamp - window.state.timeNodes[0]) / 1000);
                if (diff > 0) window.state.intervals.unshift(diff);
            }
            window.state.timeNodes.unshift(timestamp);
            if (window.state.timeNodes.length > 15) window.state.timeNodes.pop();
            if (window.state.intervals.length > 15) window.state.intervals.pop();
            updateUI();
        };

        function updateUI() {
            const list = document.getElementById('node-history');
            list.innerHTML = '';
            window.state.timeNodes.forEach((t, i) => {
                const d = new Date(t);
                const item = document.createElement('div');
                item.className = "flex justify-between p-3 bg-white/5 border-l-2 border-blue-500 rounded-r-lg mb-2";
                item.innerHTML = `<span class="font-mono text-sm text-blue-400">NODE #${window.state.timeNodes.length - i}</span>
                                 <span class="font-mono text-sm text-white">${d.toLocaleTimeString([], {hour12: false})}</span>`;
                list.appendChild(item);
            });
            if (window.chart && window.state.intervals.length > 0) {
                window.chart.data.labels = window.state.intervals.map((_, i) => `Δ${i+1}`).reverse();
                window.chart.data.datasets[0].data = [...window.state.intervals].reverse();
                window.chart.update();
            }
        }

        window.predictNextTime = () => {
            if (window.state.timeNodes.length < 3) return showToast("Sync 3 nodes", true);
            const btn = document.getElementById('predict-btn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> CALCULATING...`;
            lucide.createIcons();
            setTimeout(() => {
                const avg = window.state.intervals.slice(0, 3).reduce((a,b)=>a+b,0) / 3;
                const nextDate = new Date(window.state.timeNodes[0] + (avg * 1000));
                document.getElementById('prediction-display').classList.remove('hidden');
                document.getElementById('predicted-timestamp').innerText = nextDate.toLocaleTimeString([], {hour12: false});
                document.getElementById('confidence-val').innerText = "94% CONFIDENCE";
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="zap" class="w-5 h-5 text-blue-500 inline mr-2"></i> EXECUTE PREDICTION`;
                lucide.createIcons();
            }, 800);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
        body { background-color: #050505; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .hidden { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .fox-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="selection:bg-blue-500/30">

    <div id="toast" class="opacity-0 translate-y-10 pointer-events-none fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest z-[200] transition-all shadow-2xl bg-blue-600 text-white"></div>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="view-layer min-h-screen flex items-center justify-center p-6 relative z-10">
        <div class="max-w-md w-full">
            <div class="text-center mb-12">
                <div class="inline-block p-4 bg-blue-600 rounded-3xl mb-6 shadow-2xl shadow-blue-500/20"><i data-lucide="zap" class="w-10 h-10 text-white fill-white"></i></div>
                <h1 class="text-6xl font-black tracking-tighter uppercase italic mb-2 text-white">FOXXY<span class="text-blue-500">!</span></h1>
                <p class="text-slate-500 text-[10px] font-black tracking-[0.5em] uppercase">Temporal Kernel v4.0</p>
            </div>
            <div class="bg-[#0f0f0f] border border-white/5 rounded-[2.5rem] p-8 shadow-3xl">
                <input id="license-key-input" type="text" placeholder="ACCESS KEY" class="w-full bg-black border border-white/10 rounded-2xl py-5 px-6 font-mono text-sm mb-6 text-white text-center focus:border-blue-500 outline-none transition-all placeholder:text-zinc-700 uppercase">
                <button onclick="handleLogin()" id="login-btn" class="w-full fox-gradient hover:opacity-90 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-[0.2em] text-xs active:scale-95 transition-all">AUTHORIZE KERNEL</button>
            </div>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" class="view-layer min-h-screen hidden flex flex-col bg-[#050505]">
        <nav class="bg-[#0f0f0f] border-b border-white/5 px-8 py-5 flex items-center justify-between">
            <h1 class="text-lg font-black italic">FOXXY! <span class="text-blue-500">MASTER PANEL</span></h1>
            <button onclick="location.reload()" class="text-zinc-500 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </nav>
        <div class="flex-1 p-8 max-w-5xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                <div class="md:col-span-4 space-y-6">
                    <div class="bg-[#0f0f0f] p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
                        <h2 class="text-[10px] font-black uppercase text-zinc-500 mb-6 tracking-widest">Generator</h2>
                        <button onclick="generateKey()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl mb-4 hover:bg-blue-500 transition-colors uppercase text-[10px] tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Generate Key
                        </button>
                        <p class="text-[9px] text-zinc-600 text-center leading-relaxed">Generated keys are stored in the global registry.</p>
                    </div>
                </div>
                <div class="md:col-span-8">
                    <div class="bg-[#0f0f0f] p-8 rounded-[2.5rem] border border-white/5 flex flex-col h-[600px] shadow-xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Active Registry</h2>
                            <button onclick="loadAllKeys()" class="text-blue-500 hover:text-blue-400 transition-colors">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div id="admin-key-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="view-layer min-h-screen hidden flex flex-col">
        <nav class="bg-[#0f0f0f] border-b border-white/5 px-8 py-5 flex items-center justify-between">
            <h1 class="text-xl font-black italic">FOXXY<span class="text-blue-500">!</span></h1>
            <button onclick="location.reload()" class="text-zinc-500 hover:text-white"><i data-lucide="power" class="w-5 h-5"></i></button>
        </nav>
        <div class="flex-1 p-6 lg:p-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-[#0f0f0f] p-8 rounded-[2.5rem] border border-white/5">
                    <button onclick="syncCurrentTime()" class="w-full fox-gradient text-white font-black py-8 rounded-2xl shadow-2xl flex flex-col items-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="timer" class="w-8 h-8"></i>
                        <span class="text-[10px] tracking-widest">CAPTURE NODE</span>
                    </button>
                </div>
                <div class="bg-[#0f0f0f] p-6 rounded-[2.5rem] border border-white/5 h-[350px] flex flex-col">
                    <div id="node-history" class="flex-1 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
            <div class="lg:col-span-8 space-y-6">
                <div id="prediction-display" class="hidden bg-gradient-to-br from-blue-600 to-indigo-900 rounded-[3rem] p-10 shadow-2xl border-4 border-white/10">
                    <span class="text-[10px] font-black text-blue-200 uppercase tracking-widest">Estimated Next Event</span>
                    <div id="predicted-timestamp" class="text-7xl font-mono font-black text-white italic tracking-tighter">00:00:00</div>
                    <div id="confidence-val" class="text-[10px] text-white/50 font-bold mt-2 uppercase">0% CONFIDENCE</div>
                </div>
                <div class="bg-[#0f0f0f] p-8 rounded-[2.5rem] border border-white/5 h-[400px]">
                    <canvas id="intervalChart"></canvas>
                    <button id="predict-btn" onclick="predictNextTime()" class="w-full bg-zinc-900 border border-white/10 text-white font-black py-6 rounded-2xl mt-4 uppercase tracking-[0.4em] text-[12px]">
                        <i data-lucide="zap" class="w-5 h-5 text-blue-500 inline mr-2"></i> EXECUTE PREDICTION
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg, isErr = false) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest z-[200] transition-all shadow-2xl ${isErr ? 'bg-red-600' : 'bg-blue-600'} text-white opacity-100 translate-y-0`;
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        }

        function initChart() {
            const canvas = document.getElementById('intervalChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Sec', data: [], backgroundColor: '#3b82f6', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#525252' } } }
                }
            });
        }
        window.onload = () => {
            lucide.createIcons();
            const observer = new MutationObserver(() => lucide.createIcons());
            observer.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
        };
    </script>
</body>
</html>
